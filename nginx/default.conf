#nginx -c /Users/mzhang/Documents/0b\ cs\ projects/screencap_py/nginx/default.conf
#test connection: lsof -i :3000   <-- PORT NAME
#quit: nginx -s quit

#quick reload: nginx -s reload

events {
    worker_connections 1024;
}

http {
    server {
        listen 3677;

        # Frontend: Serve static files
        location / {
            proxy_pass http://localhost:3615;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # Backend: API routes under /server
        location /server/ {
            rewrite ^/server/(.*)$ /$1 break;
            proxy_pass http://localhost:3672;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # HLS streams
        location /hls/ {
            proxy_pass http://localhost:3672;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
